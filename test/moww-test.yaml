esphome:
  name: moww-test

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

external_components:
  - source:
      type: local
      path: ../components

i2s_audio:
  i2s_lrclk_pin: GPIO5
  i2s_bclk_pin: GPIO6

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_din_pin: GPIO7
    pdm: false
    sample_rate: 16000

micro_wake_word:
  id: mww
  microphone:
    microphone: mic
    channels: 0
  models:
    - model: okay_nabu
      id: okay_nabu
  vad:
  pcm_history:
    duration: 3s
  verifier:
    model: verifier_placeholder.tflite
    probability_cutoff: 0.7
    tensor_arena_size: 300000
  on_wake_word_detected:
    - logger.log:
        format: "wake word %s"
        args: ["wake_word.c_str()"]

switch:
  - platform: template
    name: "On-device verification"
    id: verifier_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: id(mww).get_verifier_model()->set_enabled(true);
    turn_off_action:
      - lambda: id(mww).get_verifier_model()->set_enabled(false);

select:
  - platform: template
    name: "Wake sensitivity"
    id: wake_sensitivity
    optimistic: true
    initial_option: "Balanced"
    restore_value: true
    entity_category: config
    options:
      - Relaxed
      - Balanced
      - Paranoid
    on_value:
      # Stage-1 cutoff stays greedy; strictness is mostly the verifier's job
      lambda: |-
        if (x == "Relaxed") {
          id(okay_nabu).set_probability_cutoff(26);                       // stage-1 0.10
          id(mww).get_verifier_model()->set_probability_cutoff(153);     // stage-2 0.60
        } else if (x == "Balanced") {
          id(okay_nabu).set_probability_cutoff(26);                       // stage-1 0.10
          id(mww).get_verifier_model()->set_probability_cutoff(178);     // stage-2 0.70
        } else {
          id(okay_nabu).set_probability_cutoff(43);                       // stage-1 0.17
          id(mww).get_verifier_model()->set_probability_cutoff(204);     // stage-2 0.80
        }
