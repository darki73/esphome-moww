esphome:
  name: moww-test

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

wifi:
  ssid: compile-test
  password: compile-test

api:

external_components:
  - source:
      type: local
      path: ../components

i2s_audio:
  i2s_lrclk_pin: GPIO5
  i2s_bclk_pin: GPIO6

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_din_pin: GPIO7
    pdm: false
    sample_rate: 16000

micro_wake_word:
  id: mww
  microphone:
    microphone: mic
    channels: 0
  models:
    - model: okay_nabu
      id: okay_nabu
  vad:
  pcm_history:
    duration: 3s
  verifier:
    model: verifier_placeholder.tflite
    probability_cutoff: 0.7
    tensor_arena_size: 300000
  on_wake_word_detected:
    - logger.log:
        format: "wake word %s"
        args: ["wake_word.c_str()"]

# Stage 3: pipeline-native verification in Home Assistant (openWakeWord).
# Only engages while the engine entity is alive in HA.
voice_assistant:
  id: va
  microphone:
    microphone: mic
    channels: 0
  micro_wake_word: mww
  ha_wake_word_verification:
    engine_entity: wake_word.openwakeword
    pre_roll: 2s

# Native entity platforms (flash-persisted; replace the old template recipes)
switch:
  - platform: micro_wake_word
    type: verifier
    name: "On-device verification"

select:
  - platform: micro_wake_word
    type: sensitivity
    name: "Wake sensitivity"
    # presets: omitted -> Relaxed/Balanced/Paranoid fleet defaults
  - platform: micro_wake_word
    type: verification
    name: "Wake verification"
    voice_assistant_id: va
